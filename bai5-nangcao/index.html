<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let n = +prompt("nhập số phần tử n:");
      let array = [];
      let sum = 0;
      let count = 0;
      for (let i = 0; i < n; i++) {
        let a = +prompt("nhập phần tử thứ " + i + ":");
        array[i] = a;
      }

      for (let i = 0; i < n; i++) {
        for (let j = 1; j <= array[i]; j++) {
          if (array[i] % j == 0) {
            count++;
          }
        }
        if (count <= 2) {
          console.log("các số nguyên tố có trong mảng:" + array[i]);
          sum += array[i];
        }
      }

      console.log("tổng của các phần tử trong mảng là:" + sum);
    </script>
  </body>
</html>
