<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      let sum = 0;
      for (let i = 1; i <= 20; i++) {
        console.log(i);
        sum += i;
      }
      console.log("Tổng các số từ 1 đến 20 là: " + sum);
      for (let i = 1; i <= 20; i++) {
        if (i % 2 === 0) {
          console.log("Số chẵn từ 1 đến 20: " + i);
        }
      }
    </script>
  </body>
</html>
